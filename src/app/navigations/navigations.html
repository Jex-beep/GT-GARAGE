<header [class.scrolled]="scrolled()">
  <div class="nav">
    <a routerLink="/" class="brand" aria-label="GT Garage home" (click)="close()">
      <img src="/gt-logo.png" alt="GT Garage logo" class="brand-logo">
      <span class="brand-name">GT Garage</span>
    </a>

    <button class="menu-btn" (click)="toggle()" [attr.aria-expanded]="menuOpen()" aria-label="Toggle menu">
      <span class="hamburger" [class.open]="menuOpen()"></span>
    </button>

    <nav class="nav-links" [class.open]="menuOpen()">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="close()">Home</a>
      <a routerLink="/services" routerLinkActive="active" (click)="close()">Services</a>
      <a routerLink="/about" routerLinkActive="active" (click)="close()">About</a>
      <a routerLink="/blogs" routerLinkActive="active" (click)="close()">Blog</a>
      <a routerLink="/track" routerLinkActive="active" (click)="close()">Track</a>
      <a routerLink="/book" class="nav-cta" (click)="close()">Book Now</a>
    </nav>
  </div>
</header>

<!-- backdrop for mobile menu -->
<div class="nav-backdrop" [class.show]="menuOpen()" (click)="close()"></div>

<div class="hazard"></div>
